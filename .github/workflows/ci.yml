name: CI

on:
  push:
    branches:
      - main
      - 'codex/**'
      - 'feature/**'
  pull_request:

jobs:
  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: zsh

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint web
        run: make lint-web

      - name: Build web
        run: make build-web

  backend:
    name: API and Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: zsh

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: python -m pip install uv

      - name: Sync API dependencies
        run: uv sync --directory apps/api

      - name: Sync worker dependencies
        run: uv sync --directory apps/worker

      - name: Run API smoke tests
        run: make test-api

      - name: Run worker smoke tests
        run: make test-worker
